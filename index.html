<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Vicente Valdebenito">
    <title>Replica Skillnest</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="Header">
        <nav class="Nav">
            <div class="Nav_Img">
                <a href="#">
                    <img src="static/img/Logo.png" alt="Logo-Skillnest">
                </a>
            </div>
            <div class="Nav_Links">
                <div class="Nav_Link Link1">
                    <a href="#">Escritorio</a>
                </div>
                <div class="Nav_Link Link2">
                    <a href="#">Contacto</a>
                </div>
                <div class="Nav_Buttons">
                    <button class="Nav_Buttons_1"><img src="static/icons/Icon_Sun.png"></button>
                    <button class="Nav_Buttons_2">Salir</button>
                </div>
            </div>
        </nav>
    </header>
    <main class="Main">
        <section class="Main_User">
            <div class="Main_User_Info">
                <img src="static/img/User_Img.png" alt="User_Img">
                <p>Vicente Valdebenito</p>
            </div>
            <div class="Main_User_Button">
                <button><img src="static/icons/Icono_Campana.png" alt="Icono_Campana"></button>
            </div>
        </section>
        <section class="Main_General">
            <div class="Main_Links">
                <div class="Main_Link1">
                    <div class="Main_Link"><img src="static/icons/Desk_Icon.png" alt="Logo_Escritorio"><a
                            href="#">Escritorio</a></div>
                    <div class="Main_Link"><img src="static/icons/User_Icon.png" alt="Logo_Perfil"><a href="#">Mi
                            Perfil</a>
                    </div>
                    <div class="Main_Link"><img src="static/icons/Classes_Icon.png" alt="Logo_Cursos"><a href="#">Cursos
                            Inscritos</a></div>
                    <div class="Main_Link"><img src="static/icons/Poll_Icon.png" alt="Logo_Cuestionarios"><a
                            href="#">Mis
                            intentos de cuestionarios</a></div>
                    <div class="Main_Link"><img src="static/icons/QNA_Icon.png" alt="Logo_Preguntas"><a
                            href="#">Pregunta y
                            respuesta</a></div>
                </div>
                <div class="Main_Link2">
                    <p>Instructor</p>
                    <div class="Main_Link Link_Seleccionado"><img src="static/icons/Classes2_Icon.png"
                            alt="Logo_Cursos"><a href="#">Mis cursos</a></div>
                    <div class="Main_Link"><img src="static/icons/Announcement_Icon.png" alt="Logo_Anuncios"><a
                            href="#">Anuncios</a></div>
                    <div class="Main_Link"><img src="static/icons/Poll2_Icon.png" alt="Logo_CuestionariosIntentos"><a
                            href="#">Intentos Del Cuestionario</a></div>
                    <div class="Main_Link"><img src="static/icons/Homework_Icon.png" alt="Logo_Tareas"><a
                            href="#">Tareas</a></div>
                    <div class="Main_Link"><img src="static/icons/Analytics_Icon.png" alt="Logo_Analytics"><a
                            href="#">Analytics</a></div>
                </div>
            </div>
            <div class="Main_Info">
                <h1>Mis cursos</h1>
                <div class="Info_Cursos">
                    <a>Publicado (4)</a>
                    <a>Pendiente (0)</a>
                    <a>Borrador (0)</a>
                    <a>Progamar (0)</a>
                </div>
                <div class="Info_Cursos_Cajas">

                </div>
            </div>
        </section>

    </main>
</body>

</html>
